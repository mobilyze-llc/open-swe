name: Mobilyze architecture guard

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  architecture:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Resolve comparison base
        id: base
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "ref=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Run architecture guard tests
        run: python -m unittest tests/mobilyze/test_architecture_guard.py
      - name: Check fork boundaries and file growth
        run: python scripts/mobilyze/check_architecture.py --base-ref "${{ steps.base.outputs.ref }}"
